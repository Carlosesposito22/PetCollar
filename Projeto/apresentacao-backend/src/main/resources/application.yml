server:
  port: 8080

spring:
  application:
    name: petCollar-backend

  # ── Persistência: PostgreSQL ─────────────────────────────────────────────
  # Valores padrão apontam para o serviço `db` do docker-compose. Para rodar
  # localmente sem Docker, suba um Postgres na 5432 com os mesmos credenciais
  # ou sobrescreva via variáveis de ambiente SPRING_DATASOURCE_*.
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/petcollar}
    username: ${SPRING_DATASOURCE_USERNAME:petcollar}
    password: ${SPRING_DATASOURCE_PASSWORD:petcollar}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      # Cria/atualiza o schema a partir das entidades JPA. CLAUDE.md §9 — sem
      # migrations manuais nesta fase do projeto.
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
    open-in-view: false

petcollar:
  security:
    jwt:
      # HS256 — substitua em produção por variável de ambiente / secret manager.
      secret: ${PETCOLLAR_SECURITY_JWT_SECRET:trocar-este-segredo-em-producao-com-no-minimo-32-bytes!!}
      issuer: "petcollar"
      expiracao-minutos: 60
    cors:
      # Patterns (com curinga) — aceita qualquer porta local em dev.
      # Em produção, troque por origens fixas (ex.: "https://app.petcollar.com").
      origens-permitidas:
        - "http://localhost:*"
        - "http://127.0.0.1:*"

logging:
  level:
    org.springframework.security: INFO
